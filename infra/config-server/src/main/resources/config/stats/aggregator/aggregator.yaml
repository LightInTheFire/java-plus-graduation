server:
  port: 0

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value-deserializer: ru.yandex.practicum.serialization.UserActionAvroDeserializer
      group-id: aggregator-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.yandex.practicum.serialization.AvroSerializer
    template:
      default-topic: stats.events-similarity.v1

app:
  kafka:
    user-actions-topic: stats.user-actions.v1
